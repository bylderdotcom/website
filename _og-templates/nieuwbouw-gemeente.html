<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Space+Mono:wght@700&display=swap');
  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background: #1A1208;
    font-family: 'Plus Jakarta Sans', sans-serif;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 64px 80px;
    position: relative;
  }
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 50% 70% at 85% 40%, rgba(184,92,56,0.15) 0%, transparent 65%),
      radial-gradient(ellipse 40% 50% at 5% 70%, rgba(61,90,62,0.12) 0%, transparent 60%);
  }
  .left {
    position: relative;
    z-index: 1;
    max-width: 600px;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 36px;
  }
  .logo-box {
    width: 44px;
    height: 44px;
    background: #3D5A3E;
    border-radius: 11px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .logo-letter {
    color: #F5F0E8;
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    font-size: 18px;
  }
  .logo-name {
    font-size: 26px;
    font-weight: 700;
    color: #F5F0E8;
    letter-spacing: -0.02em;
  }
  .logo-name span { color: #8AAE8B; }
  .label {
    display: inline-block;
    background: rgba(184,92,56,0.2);
    border: 1px solid rgba(184,92,56,0.35);
    color: #D4795A;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 5px 14px;
    border-radius: 999px;
    margin-bottom: 20px;
  }
  h1 {
    font-size: 50px;
    font-weight: 800;
    color: #F5F0E8;
    letter-spacing: -0.03em;
    line-height: 1.1;
    margin-bottom: 20px;
  }
  h1 span { color: #D4795A; }
  .sub {
    font-size: 19px;
    color: rgba(245,240,232,0.4);
    line-height: 1.55;
  }
  .right {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    gap: 14px;
    flex-shrink: 0;
  }
  .stat {
    background: rgba(245,240,232,0.05);
    border: 1px solid rgba(245,240,232,0.09);
    border-radius: 14px;
    padding: 20px 26px;
    width: 280px;
  }
  .stat-num {
    font-size: 36px;
    font-weight: 800;
    color: #F5F0E8;
    letter-spacing: -0.03em;
    margin-bottom: 4px;
  }
  .stat-num span { color: #D4795A; }
  .stat-label {
    font-size: 13px;
    color: rgba(245,240,232,0.35);
  }
  .bottom-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent, #B85C38, #D4795A, #B85C38, transparent);
  }
</style>
</head>
<body>
  <div class="left">
    <div class="logo">
      <div class="logo-box"><span class="logo-letter">B.</span></div>
      <span class="logo-name">Bylder<span>.com</span></span>
    </div>
    <div class="label">Nieuwbouw per gemeente</div>
    <h1>Wat kost<br>nieuwbouw in<br><span>jouw gemeente?</span></h1>
    <p class="sub">Vergelijk marktprijzen, projecten<br>en kortingen per gemeente in Nederland</p>
  </div>
  <div class="right">
    <div class="stat">
      <div class="stat-num">288<span>+</span></div>
      <div class="stat-label">Gemeenten in kaart gebracht</div>
    </div>
    <div class="stat">
      <div class="stat-num">33.000<span>+</span></div>
      <div class="stat-label">Productpagina's met lokale prijzen</div>
    </div>
    <div class="stat">
      <div class="stat-num">19</div>
      <div class="stat-label">Productcategorieën vergeleken</div>
    </div>
  </div>
  <div class="bottom-bar"></div>
</body>
</html>
