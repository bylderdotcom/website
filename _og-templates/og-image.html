<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Space+Mono:wght@700&display=swap');
  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background: #1A1208;
    font-family: 'Plus Jakarta Sans', sans-serif;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 64px 80px;
    position: relative;
  }
  /* Achtergrond textuur */
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 80% at 80% 50%, rgba(61,90,62,0.18) 0%, transparent 70%),
      radial-gradient(ellipse 40% 60% at 10% 80%, rgba(184,92,56,0.10) 0%, transparent 60%);
  }
  .left {
    position: relative;
    z-index: 1;
    max-width: 620px;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 40px;
  }
  .logo-box {
    width: 44px;
    height: 44px;
    background: #3D5A3E;
    border-radius: 11px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .logo-letter {
    color: #F5F0E8;
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    font-size: 18px;
  }
  .logo-name {
    font-size: 26px;
    font-weight: 700;
    color: #F5F0E8;
    letter-spacing: -0.02em;
  }
  .logo-name span { color: #8AAE8B; }
  .label {
    display: inline-block;
    background: rgba(61,90,62,0.35);
    border: 1px solid rgba(138,174,139,0.3);
    color: #8AAE8B;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 5px 14px;
    border-radius: 999px;
    margin-bottom: 20px;
  }
  h1 {
    font-size: 52px;
    font-weight: 800;
    color: #F5F0E8;
    letter-spacing: -0.03em;
    line-height: 1.1;
    margin-bottom: 20px;
  }
  h1 span { color: #8AAE8B; }
  .sub {
    font-size: 20px;
    color: rgba(245,240,232,0.45);
    line-height: 1.5;
    font-weight: 400;
  }
  .right {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    gap: 16px;
    flex-shrink: 0;
  }
  .pill {
    background: rgba(245,240,232,0.06);
    border: 1px solid rgba(245,240,232,0.1);
    border-radius: 14px;
    padding: 18px 24px;
    width: 280px;
  }
  .pill-num {
    font-size: 28px;
    font-weight: 800;
    color: #F5F0E8;
    letter-spacing: -0.03em;
    margin-bottom: 4px;
  }
  .pill-num span { color: #8AAE8B; }
  .pill-label {
    font-size: 13px;
    color: rgba(245,240,232,0.4);
    font-weight: 500;
  }
  .divider {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent, #3D5A3E, #8AAE8B, #3D5A3E, transparent);
  }
</style>
</head>
<body>
  <div class="left">
    <div class="logo">
      <div class="logo-box"><span class="logo-letter">B.</span></div>
      <span class="logo-name">Bylder<span>.com</span></span>
    </div>
    <div class="label">AI Kopersbegeleiding</div>
    <h1>Slim kopen<br>begint bij<br><span>Bylder</span></h1>
    <p class="sub">Offerte-check · Meerwerkanalyse<br>Kortingsvouchers bij 40+ merken</p>
  </div>
  <div class="right">
    <div class="pill">
      <div class="pill-num">€4.200<span>+</span></div>
      <div class="pill-label">Gemiddelde besparing per lid</div>
    </div>
    <div class="pill">
      <div class="pill-num">4.800<span>+</span></div>
      <div class="pill-label">Tevreden leden</div>
    </div>
    <div class="pill">
      <div class="pill-num">€99</div>
      <div class="pill-label">Eenmalig · geen abonnement</div>
    </div>
  </div>
  <div class="divider"></div>
</body>
</html>
